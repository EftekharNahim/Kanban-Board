<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body id="log-bdy">
    <Div class="Container">
        <div class="loginForm">
            <div>
                <h1 style="background-color: green; color: aliceblue;padding: 5px;border-radius: 5%;border: 5px green;">
                    Login Form</h1>
            </div>
            <form action="">
                <div class="login" id="user">
                    <img class="icon" src="Email.png" alt="Email">
                    <input type="text" placeholder="Enter your email" name="email" required>
                </div>
                <div class="login" id="password">
                    <img class="icon" src="Password.png" alt="password">
                    <input type="password" placeholder="Enter your password" name="password" required>
                </div>
            </form>
            <button id="log-btn">Login</button>
            <div>
                not a member?<a href="Regestration.html">Signup Now</a>
            </div>
        </div>
    </Div>
</body>

</html>
