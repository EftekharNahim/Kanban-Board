<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regestration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="Reg-bdy">
    <div class="Container">
        <div class="loginForm">
            <div>
                <h1 style="background-color: green; color: aliceblue;padding: 5px;border-radius: 5%;border: 5px green;">Regestration Form</h1>
            </div>
            <form action="">
                <div class="Reg" >
                    <img class="icon" src="username.png" alt="username">
                    <input type="text" id="Username" placeholder="Enter your username" name="username" required>
                </div>
                 <div class="validReg" ></div>
                <div class="Reg" >
                    <img class="icon" src="Email.png" alt="Email">
                    <input type="text" id="Mail" placeholder="Enter your email" name="email" required>
                </div>
                 <div class="validReg" ></div>
                <div class="Reg" >
                    <img class="icon" src="Password.png" alt="password">
                    <input type="password" id="password" placeholder="Enter your password" name="password" required>
                </div>
                 <div class="validReg" ></div>
            </form>
            <button id="SignUp-btn">Signup</button>
            <div>
                Already Registered?<a href="Login.html">Login Now</a>
            </div>
        </div>
    </div>
    <script>var exports = {}</script>
    <script type="module" src="./Regestration.js"></script>
</body>
</html>
