<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="dashStyle.css">
</head>

<body>
    <div id="Log-Dash">
        <a id="Log-Dash-inf" href="Login.html">Login</a>
        <div id="AccInf">
            <p style="padding-right: 5px;" id="acco">User name</p>
            <a href="Login.html" id="LogOut">Logout</a>
        </div>
    </div>
    <div id="Heading">
        <div id="intro">
            <h1>Kanban Board</h1>
        </div>
    </div>
    <div id="All-Section">
        <div class="k-task">
            <!--           To Do Part            -->

            <div class="title" style="background-color: rgb(10, 167, 10);">
                <h2>TODO</h2>
            </div>
            <div class="inf" >
                <div id="todo"></div>
                <div class="task">
                    <form action="" id="form">
                        <label for="Title">Title</label> <br>
                        <input type="text" placeholder="Enter your title" name="Title" id="Title" class="fInput"
                            required>
                        <br>
                        <label for="Description">Description</label> <br>
                        <input type="text" placeholder="Enter your description" name="Description" id="Description"
                            class="fInput" optional> <br>
                        <label for="assigned">Assigned</label> <br>
                        <input type="text" id="Assign" placeholder="Assigned to" class="fInput">
                        <button id="add" type="submit">Add</button>
                    </form>

                </div>
                <button id="addTodo" >Add task</button>
            </div>
        </div>
        <!-- Progress part -->
        <div class="k-task">
            <div class="title" style="background-color: rgb(240, 240, 52);">
                <h2>In Progress</h2>
            </div>
            <div class="inf" id="Progress">

            </div>
        </div>
        <!-- Testing part -->
        <div class="k-task">
            <div class="title" style="background-color: rgb(241, 184, 77);">
                <h2>Testing</h2>
            </div>
            <div class="inf" id="Testing">

            </div>
        </div>
        <!-- Finished part -->
        <div class="k-task">
            <div class="title" style="background-color: red;">
                <h2>Finished</h2>
            </div>
            <div class="inf" id="Finished">

            </div>
        </div>
    </div>
    <!-- <script>var exports = {}</script> -->
    <script type="module" src="./dash.js"></script>
</body>

</html>
